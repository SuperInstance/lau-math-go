apiVersion: v1
kind: Service
metadata:
  name: lau-math-go
  labels:
    app: lau-math-go
spec:
  type: ClusterIP
  ports:
    - name: rest
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
  selector:
    app: lau-math-go
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lau-math-go
  labels:
    app: lau-math-go
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lau-math-go
  template:
    metadata:
      labels:
        app: lau-math-go
    spec:
      containers:
        - name: lau-math-go
          image: lau-math-go:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: rest
            - containerPort: 9090
              name: grpc
          env:
            - name: LAU_HARDWARE_PROFILE
              value: "cloud"
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lau-math-go-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lau-math-go
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
